<div class="flex h-screen bg-gray-100">
  <aside class="w-64 bg-slate-800 text-white flex flex-col">
    <div class="px-4 py-5 text-lg font-semibold border-b border-slate-700">
      Dashboard
    </div>

    <nav class="flex-1 py-4">
      <a *ngFor="let item of menu" [routerLink]="item.link" routerLinkActive="bg-slate-700"
        class="block px-4 py-3 hover:bg-slate-700 transition-colors">
        {{ item.label }}
      </a>
    </nav>

    <div class="p-4 border-t border-slate-700">
      <app-button (click)="logout()" variant="danger">
        Logout
      </app-button>
    </div>
  </aside>

  <main class="flex-1 overflow-auto">
    <router-outlet></router-outlet>
  </main>
</div>
